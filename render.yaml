services:
  - type: web
    name: tydee-tasks
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: node build-entry.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
